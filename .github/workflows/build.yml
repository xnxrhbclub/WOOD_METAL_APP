name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Create user
        run: |
          sudo useradd -m builder
          sudo chown -R 1000:1000 ${{ github.workspace }}

      - name: Build APK
        run: |
          docker run --rm \
            --user 1000:1000 \
            -v "${{ github.workspace }}:/home/user/app" \
            -w /home/user/app \
            -e HOME=/home/user \
            kivy/buildozer:latest \
            buildozer android debug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            bin/*.apk
            .buildozer/**/*.log
